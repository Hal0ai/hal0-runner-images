name: Build runner images

# Build + push the publish:ci hal0 runner images to ghcr.io/hal0ai/.
# BUILD ONLY — pinning the app manifest is a separate, build-free workflow
# (pin-digests.yml). Referenced/external images are built elsewhere and are
# never built here; pin-digests.yml still pins their published digests.
#
# Migrated from the app repo's .github/workflows/toolbox.yml (which only built
# qwen3tts). Model: one matrix leg per image with publish=="ci" in images.json
# (today only comfyui; future new owned images e.g. vibevoice). linux/amd64;
# GitHub-hosted runner is fine (build only pulls base layers + pip/dnf).
# publish=="external"/"manual" images are NEVER built here — only their
# published digests are pinned by scripts/emit-manifest.sh.
#
# DISPATCH-ONLY by design. There is NO push/PR auto-trigger: a metadata edit
# (images.json, a doc) must not rebuild + re-push every runner image, and most
# owned images (kokoro/moonshine/qwen3tts/flm/cpu) are already published from
# other lineages — re-pushing them from here 403s (their org packages aren't
# writable by this repo) and would churn their digests. Build deliberately, one
# or a few images at a time, via `only`. Referenced images (vulkan/rocm/rocmfpx)
# build in their own repos.

on:
  workflow_dispatch:
    inputs:
      only:
        description: "Comma-separated image keys to build (blank = all publish:ci images, currently just comfyui)"
        type: string
        default: "comfyui"
      push:
        description: "Push to ghcr.io (true) or build-only dry-run (false)"
        type: boolean
        default: true

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # Derive the build matrix from images.json (owned images only), honouring
  # the optional workflow_dispatch `only` filter.
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set
        shell: bash
        run: |
          python3 - "${{ github.event.inputs.only }}" <<'PY' >> "$GITHUB_OUTPUT"
          import json, os, sys
          only = {s.strip() for s in (sys.argv[1] or "").split(",") if s.strip()}
          doc = json.load(open("images.json"))
          legs = []
          for key, e in doc["images"].items():
              # Build ONLY images this repo is the publisher of. 'external'
              # (archived-here-published-elsewhere) and 'manual' (referenced)
              # must not rebuild/repush — they'd 403 on pre-existing org
              # packages and/or overwrite the canonical artifact. Their digests
              # are still pinned by emit-manifest.sh. See images.json _comment.
              if e.get("publish") != "ci":
                  continue
              if only and key not in only:
                  continue
              b = e["build"]
              legs.append({
                  "key": key,
                  "image": e["image"],
                  "tag": e["tag"],
                  "context": b["context"],
                  "dockerfile": b["dockerfile"],
                  "build_args_from": b.get("build_args_from", ""),
              })
          print("matrix=" + json.dumps({"include": legs}))
          PY

  build:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # Load versions.env (comfyui) into build-args if the leg declares one.
      - name: Assemble build args
        id: args
        shell: bash
        run: |
          args=""
          if [[ -n "${{ matrix.build_args_from }}" && -f "${{ matrix.build_args_from }}" ]]; then
            while IFS= read -r line; do
              [[ "$line" =~ ^[[:space:]]*# ]] && continue
              [[ -z "${line// }" ]] && continue
              kv="${line%%#*}"; kv="${kv//[[:space:]]/}"
              [[ "$kv" == *=* ]] && args+="${kv}"$'\n'
            done < "${{ matrix.build_args_from }}"
          fi
          {
            echo "build_args<<EOF"
            printf '%s' "$args"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ matrix.tag }},enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
            type=ref,event=branch
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=${{ matrix.key }}
            org.opencontainers.image.source=https://github.com/Hal0ai/hal0-runner-images

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push == true) }}
          build-args: ${{ steps.args.outputs.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.key }}
          cache-to: type=gha,mode=max,scope=${{ matrix.key }}
          platforms: linux/amd64
          provenance: false

      - name: Report digest
        if: steps.build.outputs.digest != ''
        run: |
          echo "Pushed ${{ matrix.image }}:${{ matrix.tag }}"
          echo "Digest ${{ steps.build.outputs.digest }}"
          echo "To pin it into the app manifest, run the 'Pin runner image digests' workflow."
